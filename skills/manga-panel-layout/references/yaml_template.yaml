page_layout:
  width: 1000
  height: 1500
  grid: [6, 6]
  margin:
    top: 90
    bottom: 90
    left: 90
    right: 90
  gutter:
    horizontal: 15
    vertical: 50

panels:
  # 1コマ目: top（断ち切り:上右）
  - id: 1
    vertices:
      - [0, 0]
      - [6, 0]
      - [6, 2.5]
      - [0, 2.5]
    bleed: ["top", "right"]

  # 2コマ目: middle（断ち切りなし）
  - id: 2
    vertices:
      - [0, 2.5]
      - [6, 2.5]
      - [6, 4]
      - [0, 4]

  # 3コマ目: bottom（断ち切り:下左右）
  - id: 3
    vertices:
      - [0, 4]
      - [6, 4]
      - [6, 6]
      - [0, 6]
    bleed: ["bottom", "left", "right"]
