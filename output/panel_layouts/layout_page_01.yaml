page_layout:
  width: 1000
  height: 1500
  grid: [6, 6]
  margin:
    top: 90
    bottom: 90
    left: 90
    right: 90
  gutter:
    horizontal: 15
    vertical: 50

panels:
  # 1コマ目: top-right（断ち切り: 上）
  - id: 1
    vertices:
      - [3, 0]
      - [6, 0]
      - [6, 2]
      - [3, 2]
    bleed: ["top"]

  # 2コマ目: top-left（断ち切りなし）
  - id: 2
    vertices:
      - [0, 0]
      - [3, 0]
      - [3, 2]
      - [0, 2]

  # 3コマ目: middle-right（断ち切りなし）
  - id: 3
    vertices:
      - [3, 2]
      - [6, 2]
      - [6, 4]
      - [3, 4]

  # 4コマ目: middle-left（断ち切りなし）
  - id: 4
    vertices:
      - [0, 2]
      - [3, 2]
      - [3, 4]
      - [0, 4]

  # 5コマ目: bottom（全幅・断ち切りなし）
  - id: 5
    vertices:
      - [0, 4]
      - [6, 4]
      - [6, 6]
      - [0, 6]
