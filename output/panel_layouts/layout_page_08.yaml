page_layout:
  width: 1000
  height: 1500
  grid: [6, 6]
  margin:
    top: 90
    bottom: 90
    left: 90
    right: 90
  gutter:
    horizontal: 15
    vertical: 50

panels:
  # 1コマ目: top-right（断ち切りなし）
  - id: 1
    vertices:
      - [3, 0]
      - [6, 0]
      - [6, 2]
      - [3, 2]

  # 2コマ目: top-left（断ち切りなし）
  - id: 2
    vertices:
      - [0, 0]
      - [3, 0]
      - [3, 2]
      - [0, 2]

  # 3コマ目: middle（小さめ・余白多め）
  - id: 3
    vertices:
      - [1.5, 2.5]
      - [4.5, 2.5]
      - [4.5, 3.5]
      - [1.5, 3.5]

  # 4コマ目: bottom（タイトル用・全幅だが高さ控えめ）
  - id: 4
    vertices:
      - [0, 4.5]
      - [6, 4.5]
      - [6, 5.5]
      - [0, 5.5]
