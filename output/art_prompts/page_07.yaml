comic_page:
  language: "Japanese"
  style: "japanese seinen manga, emotional, comedic, travel essay"
  writing-mode: "vertical-rl"
  color_mode: "白黒"
  aspect_ratio: "2:3"

  instructions: |-
    このYAMLは漫画ページの仕様です。添付の画像データ（キャラクター等、コマ割り画像）がある場合は、
    それらを外見の基準として忠実に反映し、このプロンプトの指示に従ってページを生成してください。

  layout_constraints: |-
    - 読み順は panel.number の昇順
    - 日本語縦書きマンガ、右から左に読む

  character_infos:
    - name: "いくま"
      base_prompt: "japanese man, late 20s, slim body, short black hair, casual backpacker, t shirt, long pants, sneakers, slightly goofy, very expressive face"

  panels:
    - number: 1
      page_position: "top"
      bleed: []
      background: "いくまの腹から全身に波のような線が押し寄せるイメージ背景"
      description: "ついに片膝をつき、腹を抱え込むいくまの大きめバストアップ。"
      objects: []
      characters:
        - name: "いくま"
          panel_position: "center"
          emotion: "限界を超えた痛みに必死に耐えている"
          facing: "斜め"
          shot: "バストアップ"
          pose: "片膝をつき、両腕で腹を抱え込んで前かがみになっている"
          scale: ""
          description: "顔は歯を食いしばり、額と頬に大量の汗。"
          lines: []
      effects:
        - "波のようなエフェクト線"
      monologues:
        - text: "腹痛は、もはや『波』ではなく——"
          text_position: "top-right"
          balloon_shape: "長方形"
      camera_angle: "medium shot"

    - number: 2
      page_position: "top"
      bleed: []
      background: "巨大な津波のイメージ。黒い海のような表現。"
      description: "津波に飲み込まれそうないくまのシルエットを、比喩的に描く。"
      objects: []
      characters:
        - name: "いくま"
          panel_position: "center"
          emotion: "抗えない圧力に飲まれそうな恐怖"
          facing: "背面"
          shot: "ロングショット"
          pose: "津波に向かって小さく立っているシルエット"
          scale: "小さめ"
          description: "実際の場面というより、メタファー的な心象風景として描く。"
          lines: []
      effects:
        - "擬音『ドドドドド……』"
      monologues:
        - text: "常時押し寄せる、『津波』になっていた。"
          text_position: "top-left"
          balloon_shape: "長方形"
      camera_angle: "wide shot"

    - number: 3
      page_position: "middle"
      bleed: []
      background: "トイレ前の行列。人々はスマホを見たり、談笑したりしている。"
      description: "周囲は落ち着いて待つ中、いくまだけ床に片膝をついているロングショット。"
      objects:
        - name: "スマホ"
        - name: "買い物袋"
      characters:
        - name: "いくま"
          panel_position: "right"
          emotion: "孤立した絶望と必死の我慢"
          facing: "斜め下"
          shot: "ロングショット"
          pose: "床に片膝をつき、腹を抱え込んでうずくまる"
          scale: "小さめ"
          description: "周囲の人々はリラックスして談笑しており、いくまとのギャップを強調。"
          lines: []
      effects: []
      monologues:
        - text: "周囲のインド人たちが談笑しながら待つ中——"
          text_position: "top-right"
          balloon_shape: "長方形"
      camera_angle: "wide shot"

    - number: 4
      page_position: "middle"
      bleed: []
      background: "背景はぼかし、いくまの顔だけをくっきりと描く。"
      description: "今にも崩れ落ちそうないくまの顔アップ。"
      objects: []
      characters:
        - name: "いくま"
          panel_position: "center"
          emotion: "限界に近い疲労と諦め"
          facing: "正面"
          shot: "顔アップ"
          pose: "視線は下に落ち、唇をわずかに震わせている"
          scale: ""
          description: "目の下のクマや汗で、消耗具合を表現。"
          lines:
            - text: "もう……歩けない……"
              char_text_position: "right"
              type: "thought"
      effects:
        - "細かい震え線"
      monologues: []
      camera_angle: "close-up"

    - number: 5
      page_position: "bottom"
      bleed: ["bottom"]
      background: "トイレロビー全体を上から俯瞰。中央に蛍光灯、その光が床を真っ白に照らしている。"
      description: "蛍光灯の無情な光に照らされるいくまを、見下ろしのワイドショットで描く。"
      objects:
        - name: "蛍光灯"
        - name: "ロビーの床"
      characters:
        - name: "いくま"
          panel_position: "center"
          emotion: "世界から切り離されたような虚無感"
          facing: "上向き"
          shot: "ロングショット"
          pose: "床に膝をつき、うなだれている小さな姿"
          scale: "小さめ"
          description: "いくまの周囲だけ少し暗く、光が残酷に彼を照らしているように見せる。"
          lines: []
      effects:
        - "蛍光灯の放射状の光線"
      monologues:
        - text: "天井の蛍光灯は、無情にも明るく、清潔に僕を照らしていた。"
          text_position: "top-right"
          balloon_shape: "長方形"
      camera_angle: "wide shot"
