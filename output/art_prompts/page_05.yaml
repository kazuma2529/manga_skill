comic_page:
  language: "Japanese"
  style: "japanese seinen manga, emotional, comedic, travel essay"
  writing-mode: "vertical-rl"
  color_mode: "白黒"
  aspect_ratio: "2:3"

  instructions: |-
    このYAMLは漫画ページの仕様です。添付の画像データ（キャラクター等、コマ割り画像）がある場合は、
    それらを外見の基準として忠実に反映し、このプロンプトの指示に従ってページを生成してください。

  layout_constraints: |-
    - 読み順は panel.number の昇順
    - 日本語縦書きマンガ、右から左に読む

  character_infos:
    - name: "いくま"
      base_prompt: "japanese man, late 20s, slim body, short black hair, casual backpacker, t shirt, long pants, sneakers, slightly goofy, very expressive face"

  panels:
    - number: 1
      page_position: "top"
      bleed: []
      background: "冷房の効いた清潔なトイレ空間、ピカピカのタイルと整然と並ぶ個室ドア"
      description: "別世界のような清潔なトイレ全体と、入口で立ちすくむいくまをロングで描く。"
      objects:
        - name: "個室ドア"
        - name: "ピカピカのタイル床"
      characters:
        - name: "いくま"
          panel_position: "bottom"
          emotion: "感動と安堵で目を輝かせている"
          facing: "斜め上"
          shot: "ロングショット"
          pose: "入口付近で立ち止まり、やや体を前に乗り出して中を見渡している"
          scale: "小さめ"
          description: "背景の清潔さと対比するため、いくまは小さめに。"
          lines: []
      effects:
        - "冷気を表すさわやかな線"
      monologues:
        - text: "中は、別世界だった。清潔な香り、冷たい空気、しっかり閉まる頑丈なドア——。"
          text_position: "top-right"
          balloon_shape: "長方形"
      camera_angle: "wide shot"

    - number: 2
      page_position: "top"
      bleed: []
      background: "個室ドアの前、柔らかい光に包まれた空間"
      description: "個室ドアを前に、うるんだ目で手を伸ばすいくまの大きめバストアップ。"
      objects:
        - name: "個室ドア"
        - name: "ドアノブ"
      characters:
        - name: "いくま"
          panel_position: "center"
          emotion: "救済を目の前にした感動と勝利感"
          facing: "正面"
          shot: "バストアップ"
          pose: "ドアノブに手を伸ばし、ほっと緩んだ表情で見つめている"
          scale: ""
          description: "目にはうっすら涙、頬はほんの少し緩んでいる。"
          lines:
            - text: "勝った……。僕は、インドに勝ったんだ"
              char_text_position: "right"
              type: "speech"
      effects:
        - "キラキラ効果"
      monologues: []
      camera_angle: "medium shot"

    - number: 3
      page_position: "middle"
      bleed: []
      background: "ドアノブとドア表面のアップ"
      description: "指先がドアノブに触れかけている手元のクローズアップ。"
      objects:
        - name: "ドアノブ"
      characters:
        - name: "いくま"
          panel_position: "center"
          emotion: "ついにたどり着いたという安堵"
          facing: "斜め下"
          shot: "極端なアップ"
          pose: "指先でそっとドアノブに触れようとしている"
          scale: ""
          description: "緊張から解放されかけた、わずかに震える指先。"
          lines: []
      effects: []
      monologues:
        - text: "あとは、この個室に滑り込むだけ——そう、信じていた。"
          text_position: "top-right"
          balloon_shape: "長方形"
      camera_angle: "extreme close-up"

    - number: 4
      page_position: "middle"
      bleed: ["right"]
      background: "視界がぐにゃりと歪んだようなエフェクト背景"
      description: "違和感を覚えて横を見るいくまの顔アップ。"
      objects: []
      characters:
        - name: "いくま"
          panel_position: "center"
          emotion: "一瞬の違和感と不安"
          facing: "斜め"
          shot: "顔アップ"
          pose: "目を細め、視線だけ横に向けている"
          scale: ""
          description: "口は少し半開き、眉がわずかに寄っている。"
          lines:
            - text: "……ん？"
              char_text_position: "left"
              type: "speech"
      effects:
        - "視界の歪みエフェクト"
      monologues:
        - text: "しかし、喜びも束の間。"
          text_position: "top-left"
          balloon_shape: "長方形"
      camera_angle: "close-up"

    - number: 5
      page_position: "bottom"
      bleed: []
      background: "トイレロビー全体、蛇のように伸びる長い行列"
      description: "ロビーをワイドでとらえ、端に小さくいくまを配置して行列の長さを強調。"
      objects:
        - name: "トイレロビー"
        - name: "長い行列"
      characters:
        - name: "いくま"
          panel_position: "right"
          emotion: "現実を理解しきれない呆然とした感情"
          facing: "正面"
          shot: "ロングショット"
          pose: "ロビーの端で立ち尽くし、行列を見つめている"
          scale: "小さめ"
          description: "体はこわばり、腕はだらんと下がっている。"
          lines: []
      effects:
        - "行列のうねりを示す線"
      monologues:
        - text: "そこには、異常なまでの『行列』ができていた。"
          text_position: "top-right"
          balloon_shape: "長方形"
      camera_angle: "wide shot"
