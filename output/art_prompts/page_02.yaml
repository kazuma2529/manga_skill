comic_page:
  language: "Japanese"
  style: "japanese seinen manga, emotional, comedic, travel essay"
  writing-mode: "vertical-rl"
  color_mode: "白黒"
  aspect_ratio: "2:3"

  instructions: |-
    このYAMLは漫画ページの仕様です。添付の画像データ（キャラクター等、コマ割り画像）がある場合は、
    それらを外見の基準として忠実に反映し、このプロンプトの指示に従ってページを生成してください。

  layout_constraints: |-
    - 誟み順は panel.number の昇順
    - 日本語縦書きマンガ、右から左に読む

  character_infos:
    - name: "いくま"
      base_prompt: "japanese man, late 20s, slim body, short black hair, casual backpacker, t shirt, long pants, sneakers, slightly goofy, very expressive face"

  panels:
    - number: 1
      page_position: "top"
      bleed: []
      background: "混雑したインドの路地、人々が行き交う"
      description: "腹を押さえながら必死の形相で走るいくまをロングで見せる。"
      objects:
        - name: "通行人"
        - name: "露店"
      characters:
        - name: "いくま"
          panel_position: "center"
          emotion: "切迫した焦りと必死さ"
          facing: "斜め"
          shot: "ロングショット"
          pose: "片手で腹を押さえ、もう片方の手を前に突き出して走っている"
          scale: ""
          description: "画面中央を斜めに走り抜ける動きで、緊急感を出す。"
          lines:
            - text: "トイレ！ トイレはどこだ！"
              char_text_position: "right"
              type: "shout"
      effects:
        - "走り線"
      monologues: []
      camera_angle: "long shot"

    - number: 2
      page_position: "top"
      bleed: []
      background: "通行人が指差す先に、少しさびれた公共トイレスペースの建物"
      description: "通行人に詰め寄るいくまと、指差された先のトイレ建物を一緒に見せる構図。"
      objects:
        - name: "公共トイレの建物"
      characters:
        - name: "いくま"
          panel_position: "left"
          emotion: "一瞬だけ希望が差し込んだ表情"
          facing: "正面"
          shot: "ミドルショット"
          pose: "通行人に身を乗り出し、汗を飛ばしながら話しかけている"
          scale: ""
          description: "手前にいくま、奥に指差されたトイレ建物を配置し、視線誘導を作る。"
          lines:
            - text: "サンキュー！"
              char_text_position: "right"
              type: "speech"
      effects:
        - "汗マーク"
      monologues:
        - text: "教えられた先は、公共のトイレスペースだった。"
          text_position: "top-left"
          balloon_shape: "長方形"
      camera_angle: "medium shot"

    - number: 3
      page_position: "middle"
      bleed: []
      background: "トイレ内部からの白飛びしたような強い光"
      description: "一歩足を踏み入れた瞬間に固まるいくまの顔アップ。"
      objects: []
      characters:
        - name: "いくま"
          panel_position: "center"
          emotion: "想像以上の光景に言葉を失っている"
          facing: "正面"
          shot: "顔アップ"
          pose: "足を一歩踏み入れた姿勢のまま固まり、目を見開く"
          scale: ""
          description: "背景を白く飛ばし、表情だけを強調する。"
          lines:
            - text: "……"
              char_text_position: "center"
              type: "speech"
      effects:
        - "ショック線"
      monologues:
        - text: "しかし、一歩足を踏み入れた瞬間——僕は立ちすくんだ。"
          text_position: "top-right"
          balloon_shape: "長方形"
      camera_angle: "close-up"

    - number: 4
      page_position: "middle"
      bleed: []
      background: "ドアのない個室、茶褐色の汚れが床一面に広がり、ハエが群がる地獄絵図"
      description: "地獄のようなトイレ内部を、やや俯瞰のロングで見せる。"
      objects:
        - name: "汚れた床"
        - name: "ハエの群れ"
        - name: "壊れかけの便器"
      characters:
        - name: "いくま"
          panel_position: "bottom"
          emotion: "現実を受け止めきれない呆然とした感情"
          facing: "背面"
          shot: "ロングショット"
          pose: "画面手前に小さく立ち尽くし、奥の惨状を見つめている"
          scale: "小さめ"
          description: "手前にいくま、奥に地獄トイレを大きく描き、コントラストを強める。"
          lines: []
      effects:
        - "ハエの飛行線"
      monologues:
        - text: "そこにあったのは、『穴』と呼ぶことすら憚られる何かだった。"
          text_position: "top-right"
          balloon_shape: "長方形"
      camera_angle: "wide shot"

    - number: 5
      page_position: "bottom"
      bleed: []
      background: "トイレ内部の汚れとハエを強調した背景"
      description: "耐え難い汚さに顔をしかめるいくまのバストアップ。"
      objects: []
      characters:
        - name: "いくま"
          panel_position: "center"
          emotion: "強烈な嫌悪と拒絶感"
          facing: "斜め"
          shot: "バストアップ"
          pose: "口元に手を当て、眉をひそめて顔をしかめる"
          scale: ""
          description: "鼻にくる臭いを感じている様子を、表情とポーズで表現。"
          lines:
            - text: "無理だ。ここでズボンを下ろすくらいなら、死んだ方がマシだ"
              char_text_position: "right"
              type: "thought"
      effects:
        - "むわっとした臭いのもや"
        - "ハエの小さなシルエット"
      monologues: []
      camera_angle: "medium shot"

    - number: 6
      page_position: "bottom"
      bleed: []
      background: "コマ右側に清潔な日本のトイレ、左側にインドの地獄トイレの対比構図"
      description: "日本とインドのトイレを左右に並べ、文化的ギャップを一目で見せる。"
      objects:
        - name: "日本のウォシュレット付き便器"
        - name: "インドの汚れたトイレ"
      characters:
        - name: "いくま"
          panel_position: "center"
          emotion: "引きつった表情で即座に撤退を決める"
          facing: "斜め"
          shot: "ロングショット"
          pose: "中央で顔を引きつらせつつ踵を返し、路地へ走り出していく"
          scale: "小さめ"
          description: "体の向きはすでに出口方向へ向いており、『逃げたい』気持ちを出す。"
          lines: []
      effects:
        - "ダッシュ線"
      monologues:
        - text: "ウォシュレットと除菌シートに守られてきた日本人のプライドが、全力で警鐘を鳴らした。"
          text_position: "top-left"
          balloon_shape: "長方形"
      camera_angle: "wide shot"
