comic_page:
  language: "Japanese"
  style: "japanese seinen manga, emotional, comedic, travel essay"
  writing-mode: "vertical-rl"
  color_mode: "白黒"
  aspect_ratio: "2:3"

  instructions: |-
    このYAMLは漫画ページの仕様です。添付の画像データ（キャラクター等、コマ割り画像）がある場合は、
    それらを外見の基準として忠実に反映し、このプロンプトの指示に従ってページを生成してください。

  layout_constraints: |-
    - 読み順は panel.number の昇順
    - 日本語縦書きマンガ、右から左に読む

  character_infos:
    - name: "いくま"
      base_prompt: "japanese man, late 20s, slim body, short black hair, casual backpacker, t shirt, long pants, sneakers, slightly goofy, very expressive face"

  panels:
    - number: 1
      page_position: "top"
      bleed: []
      background: "強い日差しが照りつける灼熱の路地、遠くまで続く建物と砂埃"
      description: "灼熱の中、腹を押さえながらヨロヨロ歩くいくまのロングショット。"
      objects:
        - name: "建物"
        - name: "電線"
      characters:
        - name: "いくま"
          panel_position: "center"
          emotion: "必死に自分を鼓舞しているが、顔は苦しそう"
          facing: "斜め"
          shot: "ロングショット"
          pose: "前かがみになりつつ腹を押さえて歩いている"
          scale: ""
          description: "強い日差しで影を長く落とし、消耗感を出す。"
          lines:
            - text: "大丈夫だ、いくま。お前ならできる。括約筋を信じろ……"
              char_text_position: "right"
              type: "thought"
      effects:
        - "陽炎のゆらぎ"
      monologues: []
      camera_angle: "long shot"

    - number: 2
      page_position: "top"
      bleed: []
      background: "小さなカフェの入口と『TOILET』の表示"
      description: "カフェの前で店員に頼み込むいくまをミドルショットで。"
      objects:
        - name: "カフェの看板"
        - name: "TOILETの表示"
      characters:
        - name: "いくま"
          panel_position: "left"
          emotion: "わらにもすがる必死さ"
          facing: "正面"
          shot: "ミドルショット"
          pose: "両手を合わせ、少し前かがみで懇願している"
          scale: ""
          description: "汗を飛ばしながら必死にお願いしている様子。"
          lines:
            - text: "トイレ、使ってもいいですか!?"
              char_text_position: "right"
              type: "speech"
      effects:
        - "汗マーク"
      monologues:
        - text: "しかし、次に訪れたカフェのトイレは——"
          text_position: "top-left"
          balloon_shape: "長方形"
      camera_angle: "medium shot"

    - number: 3
      page_position: "middle"
      bleed: []
      background: "汚れた便器と水の出ない蛇口が見えるトイレ内部"
      description: "ドアの隙間から中を覗き込み、うんざりした目元のアップ。"
      objects:
        - name: "汚れた便器"
        - name: "蛇口"
      characters:
        - name: "いくま"
          panel_position: "right"
          emotion: "がっかりと諦めが混ざった感情"
          facing: "斜め"
          shot: "極端なアップ"
          pose: "ドアの隙間から片目で中を覗いている"
          scale: ""
          description: "目元を中心に、うんざりした視線とまぶたの重さを強調する。"
          lines: []
      effects: []
      monologues:
        - text: "水が流れない仕様だった。"
          text_position: "top-right"
          balloon_shape: "長方形"
      camera_angle: "extreme close-up"

    - number: 4
      page_position: "middle"
      bleed: []
      background: "安宿の薄暗い廊下と、古びたトイレドア"
      description: "砕け散った便座を見下ろすいくまをミドルショットで。"
      objects:
        - name: "砕け散った便座"
      characters:
        - name: "いくま"
          panel_position: "center"
          emotion: "言葉を失う絶望と疲労"
          facing: "斜め下"
          shot: "ミドルショット"
          pose: "便座を見下ろし、口を開けたまま固まっている"
          scale: ""
          description: "肩が落ち、全身に『もうやめてくれ』という空気が漂う。"
          lines: []
      effects:
        - "シーン……とした静けさの線"
      monologues:
        - text: "その次に頼み込んだ安宿のトイレは、便座が砕け散っていた。"
          text_position: "top-left"
          balloon_shape: "長方形"
      camera_angle: "medium shot"

    - number: 5
      page_position: "bottom"
      bleed: []
      background: "黒ベタに大きく『キュルルル……ゴゴゴッ……』の擬音"
      description: "お腹の音と共に限界が近づくいくまのバストアップ。"
      objects: []
      characters:
        - name: "いくま"
          panel_position: "center"
          emotion: "必死にこらえながらも表情に限界が出ている"
          facing: "斜め"
          shot: "バストアップ"
          pose: "体をくの字に折り、両手で腹を抱え込む"
          scale: ""
          description: "歯を食いしばり、額や頬に大量の汗。"
          lines: []
      effects:
        - "擬音『キュルルル……ゴゴゴッ……』"
        - "震え線"
      monologues:
        - text: "歩くたびに、お腹の中の反乱軍は勢力を増していく。"
          text_position: "top-right"
          balloon_shape: "長方形"
      camera_angle: "medium shot"

    - number: 6
      page_position: "bottom"
      bleed: []
      background: "迷路のように入り組んだバラナシの路地とギラギラした太陽を俯瞰で"
      description: "上から見下ろした街全体の迷宮感と、さまよういくまを小さく描く。"
      objects:
        - name: "入り組んだ路地"
        - name: "太陽"
      characters:
        - name: "いくま"
          panel_position: "center"
          emotion: "疲労と焦りと諦めが混ざった感情"
          facing: "背面"
          shot: "ロングショット"
          pose: "小さく、腹を押さえながらフラフラと歩いている"
          scale: "小さめ"
          description: "街のスケール感に対して極端に小さく描き、孤独感と迷子感を出す。"
          lines:
            - text: "どこかに……どこかに、まともな文明はないのか……！"
              char_text_position: "right"
              type: "speech"
      effects:
        - "陽炎"
      monologues:
        - text: "灼熱の街を、腹痛を抱えたままさまよって——すでに1時間以上が過ぎていた。"
          text_position: "bottom-left"
          balloon_shape: "長方形"
      camera_angle: "wide shot"
