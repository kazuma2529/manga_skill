comic_page:
  language: "Japanese"
  style: "japanese seinen manga, emotional, comedic, travel essay"
  writing-mode: "vertical-rl"
  color_mode: "白黒"
  aspect_ratio: "2:3"

  instructions: |-
    このYAMLは漫画ページの仕様です。添付の画像データ（キャラクター等、コマ割り画像）がある場合は、
    それらを外見の基準として忠実に反映し、このプロンプトの指示に従ってページを生成してください。

  layout_constraints: |-
    - 読み順は panel.number の昇順
    - 日本語縦書きマンガ、右から左に読む

  character_infos:
    - name: "いくま"
      base_prompt: "japanese man, late 20s, slim body, short black hair, casual backpacker, t shirt, long pants, sneakers, slightly goofy, very expressive face"

  panels:
    - number: 1
      page_position: "top"
      bleed: []
      background: "トイレロビー、少し引いた構図。蛍光灯の光と静けさ。"
      description: "同じロビーだが、少し引いた位置から、うつむいて座り込むいくまをロングショットで。"
      objects:
        - name: "蛍光灯"
        - name: "ロビーの床"
      characters:
        - name: "いくま"
          panel_position: "center"
          emotion: "心が折れかけている静かな絶望"
          facing: "斜め下"
          shot: "ロングショット"
          pose: "肩を落とし、うつむいたまま座り込んでいるシルエット"
          scale: "小さめ"
          description: "周囲にはまだ人がいるが、あえてぼかして『ひとり感』を出す。"
          lines: []
      effects: []
      monologues:
        - text: "聖地インド。僕はここで、悟りを開くどころか——"
          text_position: "top-right"
          balloon_shape: "長方形"
      camera_angle: "wide shot"

    - number: 2
      page_position: "top"
      bleed: []
      background: "白ベタ背景にモノローグのみ。"
      description: "シルエット寄りの顔アップとモノローグで締めに向かう。"
      objects: []
      characters:
        - name: "いくま"
          panel_position: "center"
          emotion: "自嘲気味な諦めと笑い"
          facing: "斜め下"
          shot: "顔アップ"
          pose: "目は影で隠れ、口元だけがわずかに笑っている"
          scale: ""
          description: "コミカルさと切なさが同居したニュアンス。"
          lines: []
      effects: []
      monologues:
        - text: "人間としての最後の矜持を、失おうとしていた。"
          text_position: "center"
          balloon_shape: "長方形"
      camera_angle: "close-up"

    - number: 3
      page_position: "middle"
      bleed: []
      background: "真っ白な空間に、小さないくまのシルエットだけがぽつんと座っている。"
      description: "余白を大きく取り、いくまの小ささと虚無感を強調したロングショット。"
      objects: []
      characters:
        - name: "いくま"
          panel_position: "center"
          emotion: "全てを諦めたような静かな無表情"
          facing: "背面"
          shot: "ロングショット"
          pose: "うつむいて座り込んだ姿"
          scale: "小さめ"
          description: "画面の大部分を白で抜き、静かな余韻を作る。"
          lines: []
      effects: []
      monologues:
        - text: "（完）"
          text_position: "bottom-right"
          balloon_shape: "長方形"
      camera_angle: "wide shot"

    - number: 4
      page_position: "bottom"
      bleed: []
      background: "白地にタイトル文字のみ。"
      description: "作品タイトルを小さく配置する余白コマ。"
      objects:
        - name: "タイトル文字『【実録】聖地インドで、僕は「究極の選択」を迫られた。』"
      characters: []
      effects: []
      monologues: []
      camera_angle: "wide shot"
